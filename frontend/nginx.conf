# ─── nginx config for the Retail AI Chatbot frontend ─────
# Serves the React SPA on / and proxies /api/* to the backend service.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA fallback — any unknown route serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed asset files
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy /api/* to the backend container.
    # The hostname `backend` matches the service name in docker-compose.yml.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Optional: health endpoint at /healthz for orchestrators
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
