# ─── Retail AI Chatbot — Docker Compose ───────────────────
# One-command full-stack launch.
#
# Usage:
#   docker compose up --build
#
# Then open http://localhost:5173 in your browser.
# The frontend container talks to the backend via the internal Docker network.

services:
  # ─── Python FastAPI backend ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: retail-ai-chatbot-backend:latest
    container_name: retail-chatbot-backend
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=*
      - LOG_LEVEL=info
    ports:
      # Exposed for direct API testing; remove if you only want
      # the frontend's nginx to reach it via the internal network.
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - chatbot-net

  # ─── React + nginx frontend ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: retail-ai-chatbot-frontend:latest
    container_name: retail-chatbot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  chatbot-net:
    driver: bridge
